<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triple Hats | Ephemeral</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .puzzle-box {
            background: #10131f;
            padding: 2rem;
            border-radius: 2rem;
            max-width: 600px;
            margin: 2rem auto;
        }
        .hat-btn {
            background: #1f2a48;
            margin: 10px;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
            border: none;
            color: white;
        }
        .quiz { margin-top: 20px; background: #03050b; padding: 1rem; border-radius: 1rem; }
        input { background: #0a0e1a; border: 1px solid #3a4a8f; padding: 8px; border-radius: 20px; color: white; width: 80%; }
    </style>
</head>
<body>
<div id="mainContainer" style="display: block;">
    <div class="puzzle-box">
        <h2>🌀 White / Dark / Gray Hats</h2>
        <p>Solve each puzzle to reveal the completion code.</p>
        <div>
            <button class="hat-btn" id="whiteHatBtn">White_Hats</button>
            <button class="hat-btn" id="darkHatBtn" disabled>Dark_Hats</button>
            <button class="hat-btn" id="grayHatBtn" disabled>Gray_Hats</button>
        </div>
        <div id="puzzleArea"></div>
        <div id="stage2Result"></div>
    </div>
</div>

<script>
    // redirect سريع - يجب على المستخدم إيقافه يدوياً
    let redirectTimeout = setTimeout(() => {
        if (window.stopRedirect !== true) {
            window.location.replace("nothing.html");
        }
    }, 600);
    
    window.preventRedirect = function() { 
        clearTimeout(redirectTimeout);
        window.stopRedirect = true;
        console.log("Redirect prevented. You are skilled.");
    };
    
    let puzzlesSolved = { white: false, dark: false, gray: false };
    
    function showPuzzle(hat) {
        let puzzleHtml = '';
        if (hat === 'white') {
            puzzleHtml = `<div class="quiz"><p>❓ What does "WPA2-Enterprise" primarily use for authentication?</p>
            <input id="puzzleAnswer" placeholder="Your answer"><button id="submitPuzzle" style="margin-left:10px;">Submit</button></div>`;
        } else if (hat === 'dark') {
            puzzleHtml = `<div class="quiz"><p>❓ What type of attack sends deauthentication frames to disconnect clients?</p>
            <input id="puzzleAnswer" placeholder="Your answer"><button id="submitPuzzle" style="margin-left:10px;">Submit</button></div>`;
        } else if (hat === 'gray') {
            puzzleHtml = `<div class="quiz"><p>❓ What does a "Honeypot" in cybersecurity mimic?</p>
            <input id="puzzleAnswer" placeholder="Your answer"><button id="submitPuzzle" style="margin-left:10px;">Submit</button></div>`;
        }
        document.getElementById('puzzleArea').innerHTML = puzzleHtml;
        document.getElementById('submitPuzzle').onclick = () => {
            let answer = document.getElementById('puzzleAnswer').value.trim().toLowerCase();
            let correct = false;
            if (hat === 'white' && (answer === 'radius' || answer === '802.1x' || answer === 'radius server')) correct = true;
            if (hat === 'dark' && (answer === 'deauthentication attack' || answer === 'deauth attack' || answer === 'deauth')) correct = true;
            if (hat === 'gray' && (answer === 'legitimate service' || answer === 'fake system' || answer === 'trap' || answer === 'decoy')) correct = true;
            if (correct) {
                puzzlesSolved[hat] = true;
                alert(`✅ Puzzle solved! ${hat} hat unlocked.`);
                document.getElementById('puzzleArea').innerHTML = '';
                updateButtons();
                if (puzzlesSolved.white && puzzlesSolved.dark && puzzlesSolved.gray) {
                    // إتمام المرحلة الثانية
                    if (typeof completeStage2 === 'function') {
                        completeStage2();
                    } else {
                        alert("All puzzles solved! Send STG2_PUZZLES_HAK to @T_Test4_Bot");
                    }
                }
            } else {
                alert("Wrong answer. Try again.");
            }
        };
    }
    
    function updateButtons() {
        if (puzzlesSolved.white) document.getElementById('darkHatBtn').disabled = false;
        if (puzzlesSolved.dark) document.getElementById('grayHatBtn').disabled = false;
    }
    
    document.getElementById('whiteHatBtn').onclick = () => showPuzzle('white');
    document.getElementById('darkHatBtn').onclick = () => showPuzzle('dark');
    document.getElementById('grayHatBtn').onclick = () => showPuzzle('gray');
</script>
<script src="js/common.js"></script>
</body>
</html>
