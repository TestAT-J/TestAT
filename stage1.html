<!DOCTYPE html>
<html lang="en">
<head>

        .router-panel {

            border-radius: 2rem;

            border: 1px solid #2c3e8f;
        }
        .input-group {

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #010101;
            border: 1px solid #2f4780;

        }
        button {

        .admin-panel {
