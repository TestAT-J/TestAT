<!DOCTYPE html>

<head>

    <title>RouterCorp Admin Panel</title>

        .router-panel {

            margin: 2rem auto;
            background: #0c0f1c;
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid #2c3e8f;
        }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.4rem; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #010101;
            border: 1px solid #2f4780;
            border-radius: 20px;
            color: white;
        }
        button {
            background: #1f3a6b;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .admin-panel { margin-top: 2rem; border-top: 1px solid cyan; padding-top: 1rem; }
        .ip-item { background: #11151f; padding: 8px; margin: 8px 0; font-family: monospace; }
